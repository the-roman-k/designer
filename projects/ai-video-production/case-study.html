<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <title>AI Video Production — Case Study · Roman Kryzhanovskyi</title>
  <meta name="description"
    content="A music video built like a product: research, storyboard, seven tools, shipped. Case study by Roman Kryzhanovskyi.">
  <meta name="author" content="Roman Kryzhanovskyi">
  <link rel="canonical" href="https://roman.design/case-studies/ai-video-production">

  <!-- Open Graph -->
  <meta property="og:title" content="AI Video Production — Case Study · Roman Kryzhanovskyi">
  <meta property="og:description"
    content="A music video built like a product: research, storyboard, seven tools, shipped.">
  <meta property="og:type" content="article">
  <meta property="og:url" content="https://roman.design/case-studies/ai-video-production">
  <meta property="og:site_name" content="Roman Kryzhanovskyi · Portfolio">

  <!-- Fonts (same as voice-ai-assistant reference) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,900;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --bg-primary: #0A0A0A;
      --text-primary: #FFFFFF;
      --text-muted: #888888;
      --font-display: 'Instrument Serif', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
    }

    html, body {
      margin: 0;
      padding: 0;
      overflow-x: clip;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
    }

    .wip {
      text-align: center;
      padding: 32px;
    }

    .wip__title {
      font-family: var(--font-display);
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 400;
      font-style: italic;
      color: var(--text-primary);
      margin: 0 0 16px;
    }

    .wip__sub {
      font-family: var(--font-body);
      font-size: clamp(13px, 1.5vw, 15px);
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      margin: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>

  <script src="../../shared/project-header.js" defer></script>
</head>

<body>
  <main class="wip" role="main">
    <h1 class="wip__title">Work in <em style="color:#CCFF00;">progress</em><span class="wip__dots" style="color:#CCFF00;"></span></h1>
    <p class="wip__sub">This case study is being crafted. Check back soon.</p>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    (function () {
      var dots = document.querySelector('.wip__dots');
      if (!dots || window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        if (dots) dots.textContent = '...';
        return;
      }

      var steps = ['', '.', '..', '...'];
      var obj = { step: 0 };

      gsap.to(obj, {
        step: steps.length,
        duration: 2,
        repeat: -1,
        ease: 'steps(' + steps.length + ')',
        onUpdate: function () {
          dots.textContent = steps[Math.min(Math.floor(obj.step), steps.length - 1)];
        }
      });
    })();
  </script>
</body>

</html>
