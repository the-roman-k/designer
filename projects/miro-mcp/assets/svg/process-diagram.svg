<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="9-phase design process diagram for Miro MCP Server">
  <title>Miro MCP Server — Design Process</title>
  <desc>Nine-phase process from Opportunity Framing to Cross-IDE Positioning, showing the complete development pipeline</desc>

  <!-- Background -->
  <rect width="900" height="300" fill="#EAEAEA" rx="8"/>

  <!-- Row label top -->
  <text x="20" y="28" font-family="Space Mono, monospace" font-size="10" fill="#666666" letter-spacing="0.05em">DESIGN PROCESS — 9 PHASES</text>

  <!-- ═══════════════════════════════════════════════════ ROW 1 — phases 1–5 -->

  <!-- Phase 01 — Opportunity Framing -->
  <rect x="20" y="40" width="150" height="72" rx="4" fill="#FFFFFF" stroke="#050505" stroke-width="1.5"/>
  <text x="30" y="58" font-family="Space Mono, monospace" font-size="10" fill="#666666">01</text>
  <text x="30" y="76" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#050505">Opportunity</text>
  <text x="30" y="91" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#050505">Framing</text>
  <text x="30" y="106" font-family="Inter, sans-serif" font-size="9" fill="#666666">Define the gap</text>

  <!-- Arrow 1→2 -->
  <line x1="170" y1="76" x2="188" y2="76" stroke="#050505" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 02 — Workflow Audit -->
  <rect x="190" y="40" width="150" height="72" rx="4" fill="#FFFFFF" stroke="#050505" stroke-width="1.5"/>
  <text x="200" y="58" font-family="Space Mono, monospace" font-size="10" fill="#666666">02</text>
  <text x="200" y="76" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#050505">Workflow</text>
  <text x="200" y="91" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#050505">Audit</text>
  <text x="200" y="106" font-family="Inter, sans-serif" font-size="9" fill="#666666">Map friction</text>

  <!-- Arrow 2→3 -->
  <line x1="340" y1="76" x2="358" y2="76" stroke="#050505" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 03 — Use Case Prioritization -->
  <rect x="360" y="40" width="150" height="72" rx="4" fill="#FFFFFF" stroke="#050505" stroke-width="1.5"/>
  <text x="370" y="58" font-family="Space Mono, monospace" font-size="10" fill="#666666">03</text>
  <text x="370" y="76" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#050505">Use Case</text>
  <text x="370" y="91" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#050505">Prioritization</text>
  <text x="370" y="106" font-family="Inter, sans-serif" font-size="9" fill="#666666">Focus scope</text>

  <!-- Arrow 3→4 -->
  <line x1="510" y1="76" x2="528" y2="76" stroke="#050505" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 04 — Capability Architecture -->
  <rect x="530" y="40" width="150" height="72" rx="4" fill="#FFFFFF" stroke="#050505" stroke-width="1.5"/>
  <text x="540" y="58" font-family="Space Mono, monospace" font-size="10" fill="#666666">04</text>
  <text x="540" y="76" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#050505">Capability</text>
  <text x="540" y="91" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#050505">Architecture</text>
  <text x="540" y="106" font-family="Inter, sans-serif" font-size="9" fill="#666666">Design system</text>

  <!-- Arrow 4→5 -->
  <line x1="680" y1="76" x2="698" y2="76" stroke="#050505" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 05 — Promptable Interaction Design — LIME HIGHLIGHT (AI phase) -->
  <rect x="700" y="40" width="180" height="72" rx="4" fill="#CCFF00" stroke="#050505" stroke-width="1.5"/>
  <text x="710" y="58" font-family="Space Mono, monospace" font-size="10" fill="#050505">05</text>
  <text x="710" y="76" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#050505">Promptable</text>
  <text x="710" y="91" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#050505">Interaction Design</text>
  <text x="710" y="106" font-family="Inter, sans-serif" font-size="9" fill="#050505">AI translation layer</text>

  <!-- Elbow connector: row 1 → row 2 (right side down then left) -->
  <line x1="880" y1="76" x2="880" y2="175" stroke="#050505" stroke-width="1.5"/>
  <line x1="880" y1="175" x2="868" y2="175" stroke="#050505" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════ ROW 2 — phases 6–9 -->

  <!-- Phase 09 — Cross-IDE Positioning — final result (dark box) -->
  <rect x="700" y="139" width="168" height="72" rx="4" fill="#050505" stroke="#050505" stroke-width="1.5"/>
  <text x="710" y="157" font-family="Space Mono, monospace" font-size="10" fill="#CCFF00">09</text>
  <text x="710" y="175" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Cross-IDE</text>
  <text x="710" y="190" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Positioning</text>
  <text x="710" y="205" font-family="Inter, sans-serif" font-size="9" fill="#CCFF00">Infrastructure</text>

  <!-- Arrow 08→09 -->
  <line x1="698" y1="175" x2="530" y2="175" stroke="#050505" stroke-width="1.5"/>
  <line x1="530" y1="175" x2="518" y2="175" stroke="#050505" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 08 — Visual Validation -->
  <rect x="360" y="139" width="150" height="72" rx="4" fill="#FFFFFF" stroke="#050505" stroke-width="1.5"/>
  <text x="370" y="157" font-family="Space Mono, monospace" font-size="10" fill="#666666">08</text>
  <text x="370" y="175" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#050505">Visual</text>
  <text x="370" y="190" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#050505">Validation</text>
  <text x="370" y="205" font-family="Inter, sans-serif" font-size="9" fill="#666666">Live board tests</text>

  <!-- Arrow 07→08 -->
  <line x1="358" y1="175" x2="346" y2="175" stroke="#050505" stroke-width="1.5" marker-end="url(#arrow-l)"/>

  <!-- Phase 07 — Reliability Hardening -->
  <rect x="190" y="139" width="150" height="72" rx="4" fill="#FFFFFF" stroke="#050505" stroke-width="1.5"/>
  <text x="200" y="157" font-family="Space Mono, monospace" font-size="10" fill="#666666">07</text>
  <text x="200" y="175" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#050505">Reliability</text>
  <text x="200" y="190" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#050505">Hardening</text>
  <text x="200" y="205" font-family="Inter, sans-serif" font-size="9" fill="#666666">Fallbacks + validation</text>

  <!-- Arrow 06→07 -->
  <line x1="188" y1="175" x2="176" y2="175" stroke="#050505" stroke-width="1.5" marker-end="url(#arrow-l)"/>

  <!-- Phase 06 — API Prototyping — LIME (AI phase) -->
  <rect x="20" y="139" width="150" height="72" rx="4" fill="#CCFF00" stroke="#050505" stroke-width="1.5"/>
  <text x="30" y="157" font-family="Space Mono, monospace" font-size="10" fill="#050505">06</text>
  <text x="30" y="175" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#050505">API</text>
  <text x="30" y="190" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#050505">Prototyping</text>
  <text x="30" y="205" font-family="Inter, sans-serif" font-size="9" fill="#050505">Build + Claude Code</text>

  <!-- Legend -->
  <rect x="20" y="255" width="12" height="12" rx="2" fill="#CCFF00" stroke="#050505" stroke-width="1"/>
  <text x="38" y="265" font-family="Inter, sans-serif" font-size="10" fill="#666666">AI-involved phase</text>
  <rect x="170" y="255" width="12" height="12" rx="2" fill="#050505"/>
  <text x="188" y="265" font-family="Inter, sans-serif" font-size="10" fill="#666666">Final output</text>
  <rect x="300" y="255" width="12" height="12" rx="2" fill="#FFFFFF" stroke="#050505" stroke-width="1"/>
  <text x="318" y="265" font-family="Inter, sans-serif" font-size="10" fill="#666666">Design / engineering phase</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#050505"/>
    </marker>
    <marker id="arrow-l" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#050505"/>
    </marker>
  </defs>
</svg>
