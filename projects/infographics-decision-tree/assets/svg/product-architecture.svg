<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three-layer product architecture of the Visualization Decision System">
  <title>Three-Layer Product Architecture</title>
  <desc>The product is structured in three layers: Taxonomy Board for expert browsing, Decision Tree for guided selection, and Recommendation/Preview for defensible chart output.</desc>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#050505"/>
    </marker>
    <marker id="arr-rev" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#050505"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="#EAEAEA"/>

  <!-- Section label -->
  <text x="32" y="34" font-family="'Space Mono', monospace" font-size="10" fill="#666666" letter-spacing="0.08em">PRODUCT ARCHITECTURE — THREE LAYERS</text>

  <!-- ─── Layer 1: Taxonomy Board ─── -->
  <rect x="24" y="52" width="232" height="220" rx="4" fill="#FFFFFF" stroke="#050505" stroke-width="1.5"/>

  <!-- Layer header -->
  <rect x="24" y="52" width="232" height="40" rx="4" fill="#050505"/>
  <rect x="24" y="72" width="232" height="20" fill="#050505"/>
  <text x="140" y="77" font-family="'Space Mono', monospace" font-size="10" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.06em">LAYER 01</text>
  <text x="140" y="107" font-family="'Inter', sans-serif" font-size="15" font-weight="700" fill="#050505" text-anchor="middle">Taxonomy Board</text>

  <!-- Content rows (representing chart families) -->
  <rect x="40" y="122" width="200" height="22" rx="3" fill="#F5F5F5" stroke="#D0D0D0" stroke-width="1"/>
  <text x="52" y="137" font-family="'Inter', sans-serif" font-size="10" fill="#666666">Comparison</text>
  <rect x="40" y="150" width="200" height="22" rx="3" fill="#F5F5F5" stroke="#D0D0D0" stroke-width="1"/>
  <text x="52" y="165" font-family="'Inter', sans-serif" font-size="10" fill="#666666">Trend &amp; Time Series</text>
  <rect x="40" y="178" width="200" height="22" rx="3" fill="#F5F5F5" stroke="#D0D0D0" stroke-width="1"/>
  <text x="52" y="193" font-family="'Inter', sans-serif" font-size="10" fill="#666666">Distribution</text>
  <rect x="40" y="206" width="200" height="22" rx="3" fill="#F5F5F5" stroke="#D0D0D0" stroke-width="1"/>
  <text x="52" y="221" font-family="'Inter', sans-serif" font-size="10" fill="#666666">Relationship</text>
  <text x="140" y="252" font-family="'Space Mono', monospace" font-size="9" fill="#050505" text-anchor="middle" letter-spacing="0.04em">+ 12 more families</text>

  <!-- Explore label -->
  <text x="140" y="278" font-family="'Inter', sans-serif" font-size="11" fill="#666666" text-anchor="middle">Expert browsing</text>

  <!-- Bidirectional arrow between Layer 1 and 2 -->
  <line x1="258" y1="155" x2="290" y2="155" stroke="#050505" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="290" y1="168" x2="258" y2="168" stroke="#050505" stroke-width="1.5" marker-end="url(#arr-rev)"/>

  <!-- ─── Layer 2: Decision Tree ─── (tallest, center panel) -->
  <rect x="296" y="44" width="272" height="236" rx="4" fill="#FFFFFF" stroke="#050505" stroke-width="2"/>

  <!-- Layer header (slightly taller = primary) -->
  <rect x="296" y="44" width="272" height="40" rx="4" fill="#050505"/>
  <rect x="296" y="64" width="272" height="20" fill="#050505"/>
  <text x="432" y="69" font-family="'Space Mono', monospace" font-size="10" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.06em">LAYER 02 — PRIMARY</text>
  <text x="432" y="101" font-family="'Inter', sans-serif" font-size="15" font-weight="700" fill="#050505" text-anchor="middle">Decision Tree</text>

  <!-- 4 question nodes -->
  <rect x="316" y="116" width="232" height="28" rx="3" fill="#F5F5F5" stroke="#050505" stroke-width="1"/>
  <text x="340" y="135" font-family="'Inter', sans-serif" font-size="11" fill="#050505" font-weight="600">01 — Goal</text>

  <rect x="316" y="154" width="232" height="28" rx="3" fill="#F5F5F5" stroke="#050505" stroke-width="1"/>
  <text x="340" y="173" font-family="'Inter', sans-serif" font-size="11" fill="#050505" font-weight="600">02 — Temporal Context</text>

  <rect x="316" y="192" width="232" height="28" rx="3" fill="#F5F5F5" stroke="#050505" stroke-width="1"/>
  <text x="340" y="211" font-family="'Inter', sans-serif" font-size="11" fill="#050505" font-weight="600">03 — Variables Count</text>

  <rect x="316" y="230" width="232" height="28" rx="3" fill="#CCFF00" stroke="#050505" stroke-width="1.5"/>
  <text x="340" y="249" font-family="'Inter', sans-serif" font-size="11" fill="#050505" font-weight="600">04 — Data Volume</text>

  <!-- Recommend first label -->
  <text x="432" y="292" font-family="'Inter', sans-serif" font-size="11" fill="#666666" text-anchor="middle">Guided recommendation</text>

  <!-- Arrow from Layer 2 to Layer 3 (one-direction — recommend first) -->
  <line x1="572" y1="155" x2="600" y2="155" stroke="#050505" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ─── Layer 3: Recommendation/Preview ─── -->
  <rect x="604" y="52" width="272" height="220" rx="4" fill="#CCFF00" stroke="#050505" stroke-width="1.5"/>

  <!-- Layer header -->
  <rect x="604" y="52" width="272" height="40" rx="4" fill="#050505"/>
  <rect x="604" y="72" width="272" height="20" fill="#050505"/>
  <text x="740" y="77" font-family="'Space Mono', monospace" font-size="10" fill="#CCFF00" text-anchor="middle" letter-spacing="0.06em">LAYER 03 — OUTPUT</text>
  <text x="740" y="107" font-family="'Inter', sans-serif" font-size="15" font-weight="700" fill="#050505" text-anchor="middle">Recommendation</text>

  <!-- Recommended chart label -->
  <rect x="624" y="122" width="232" height="40" rx="3" fill="#050505"/>
  <text x="740" y="139" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="#CCFF00" text-anchor="middle">→ Heatmap</text>
  <text x="740" y="155" font-family="'Space Mono', monospace" font-size="9" fill="#CCFF00" text-anchor="middle">RECOMMENDED PATTERN</text>

  <!-- Reasoning path -->
  <text x="640" y="185" font-family="'Inter', sans-serif" font-size="10" fill="#050505">Why it fits:</text>
  <text x="640" y="200" font-family="'Inter', sans-serif" font-size="10" fill="#333333">High density + 2 variables</text>
  <text x="640" y="215" font-family="'Inter', sans-serif" font-size="10" fill="#333333">→ heatmap over scatter</text>

  <!-- Live preview box -->
  <rect x="624" y="228" width="232" height="28" rx="3" fill="#050505" opacity="0.08" stroke="#050505" stroke-width="1"/>
  <text x="740" y="247" font-family="'Inter', sans-serif" font-size="11" fill="#050505" text-anchor="middle">Live preview</text>

  <!-- Defensible label -->
  <text x="740" y="286" font-family="'Inter', sans-serif" font-size="11" fill="#050505" text-anchor="middle">Defensible reasoning chain</text>

  <!-- Caption below entire diagram -->
  <text x="450" y="308" font-family="'Inter', sans-serif" font-size="11" fill="#666666" text-anchor="middle">Recommend first, browse second — cognitive load reduced without removing professional control</text>
</svg>
